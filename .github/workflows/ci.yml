name: ci

on:
  pull_request:
  push:
    branches: [main]

# Cancel previous runs of the same ref to save CI minutes when multiple
# pushes hit the same PR in quick succession.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0           # full history; some verify.sh checks need it

      # ----- toolchain: C++ (only installs if needed; APT cache is fast) -----
      - name: Install C++ toolchain (cmake, g++)
        run: |
          if [ -f CMakeLists.txt ]; then
            sudo apt-get update -y
            sudo apt-get install -y --no-install-recommends cmake g++ make
          else
            echo "No CMakeLists.txt; skipping C++ toolchain install."
          fi

      # ----- toolchain: Python (only sets up if needed) -----
      - name: Set up Python
        if: hashFiles('pyproject.toml', 'setup.py', 'requirements.txt') != ''
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install uv (Python projects with pyproject.toml)
        if: hashFiles('pyproject.toml') != ''
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      # ----- the one verification command -----
      - name: Verify
        run: bash ./scripts/verify.sh
